<h1>Blood Sugar Calculator 🩸</h1>
<p style="text-align:center;color:#666;">Check your glucose levels. Used by 96M Americans with prediabetes.</p>

<!-- Calculator 1: mg/dL to mmol/L -->
<div class="calc-box">
    <h2>1. Convert mg/dL ⇄ mmol/L</h2>
    <label>Enter Blood Sugar:</label>
    <input type="number" id="glucoseInput" placeholder="Example: 100">
    <select id="unitSelect">
        <option value="mgdl">mg/dL - US Standard</option>
        <option value="mmol">mmol/L - UK/Canada</option>
    </select>
    <button onclick="convertGlucose()">Convert</button>
    <div id="convertResult" class="result"></div>
</div>

<!-- Calculator 2: A1C to Average Glucose -->
<div class="calc-box">
    <h2>2. A1C to Average Blood Sugar</h2>
    <label>Enter A1C %:</label>
    <input type="number" id="a1cInput" placeholder="Example: 5.7" step="0.1">
    <button onclick="calcA1C()">Calculate Average Glucose</button>
    <div id="a1cResult" class="result"></div>
</div>

<!-- Calculator 3: Check Your Level -->
<div class="calc-box">
    <h2>3. Is My Blood Sugar Normal?</h2>
    <label>Enter Fasting Blood Sugar (mg/dL):</label>
    <input type="number" id="fastingInput" placeholder="Test after 8 hours no food">
    <button onclick="checkLevel()">Check Level</button>
    <div id="levelResult" class="result"></div>
</div>

<!-- ADA Chart -->
